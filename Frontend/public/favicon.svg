<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="48" height="58">
  <!-- Nepal Flag - Two stacked pennants -->
  <defs>
    <clipPath id="flag">
      <!-- Bottom pennant -->
      <polygon points="5,0 95,52 5,52 5,100 95,100 5,120"/>
    </clipPath>
  </defs>
  <!-- Flag shape -->
  <polygon points="5,0 95,52 5,52" fill="#DC143C" stroke="#003893" stroke-width="4"/>
  <polygon points="5,52 95,100 5,120" fill="#DC143C" stroke="#003893" stroke-width="4"/>
  <!-- Moon in upper pennant -->
  <circle cx="35" cy="25" r="12" fill="white"/>
  <circle cx="39" cy="23" r="10" fill="#DC143C"/>
  <!-- Sun/star in lower pennant -->
  <polygon points="35,75 37,81 43,81 38,85 40,91 35,87 30,91 32,85 27,81 33,81" fill="white"/>
</svg>
