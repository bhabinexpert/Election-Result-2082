# Netlify Configuration for Nepal Election 2082 Frontend

[build]
  # Base directory for the frontend
  base = "Frontend"

  # Build command
  command = "npm run build"

  # Output directory (relative to base)
  publish = "dist"

# Environment variables (set sensitive values in Netlify dashboard)
[build.environment]
  NODE_VERSION = "18"

# SPA redirect - routes all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Production context
[context.production]
  command = "npm run build"

# Preview/branch deploy context
[context.deploy-preview]
  command = "npm run build"
