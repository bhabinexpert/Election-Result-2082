# Netlify Configuration for Nepal Election 2082 Frontend

[build]
  # Base directory for the frontend
  base = "Frontend"

  # Build command
  command = "npm run build"

  # Output directory (relative to base)
  publish = "dist"

# Environment variables (set sensitive values in Netlify dashboard)
[build.environment]
  NODE_VERSION = "18"

# SPA redirect - routes all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


